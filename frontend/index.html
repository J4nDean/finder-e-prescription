<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
    <link rel="icon" href="/icon.svg?v=2" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png?v=2" />

    <!-- Viewport: cover = edge-to-edge on iOS notch/Dynamic Island -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- iOS PWA standalone mode — hides Safari chrome (address bar, toolbar) when
         the user adds the app to the Home Screen. Without these tags Safari shows
         its navigation bars even after installation. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Apteki" />
    <!-- black-translucent: status bar overlays the app (true edge-to-edge).
         Combine with safe-area-inset padding on the app shell to avoid overlap. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Android / generic PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />

    <!-- PWA manifest (generated by vite-plugin-pwa) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>Finder E-Prescription</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
